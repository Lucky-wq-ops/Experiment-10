<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docker Static Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🚀 Docker CI/CD Static Website</h1>
    <p>Built with GitHub Actions & Docker</p>
  </header>

  <main>
    <div class="card">
      <h2>About</h2>
      <p>This website is containerized using Docker and built automatically using CI/CD.</p>
    </div>

    <div class="card">
      <h2>Click Counter</h2>
      <p>You clicked <span id="count">0</span> times</p>
      <button onclick="increaseCount()">Click Me</button>
    </div>
  </main>

  <footer>
    <p>© 2026 Docker Project</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
